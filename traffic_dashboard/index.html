<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>sing-box 流量去向</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="shell">
    <header>
      <div>
        <p class="eyebrow">SING-BOX · 本地统计</p>
        <h1>流量去了哪里</h1>
        <p class="subtitle">按站点、应用、规则和实际出口累计；只保存连接元数据与字节数，不保存访问内容。</p>
      </div>
      <div class="status-wrap"><span id="statusDot" class="dot"></span><span id="statusText">正在连接统计器…</span></div>
    </header>

    <section class="toolbar" aria-label="统计范围">
      <div class="segmented" id="periods">
        <button data-period="today" class="active">今天</button>
        <button data-period="yesterday">昨天</button>
        <button data-period="7d">近 7 天</button>
        <button data-period="30d">近 30 天</button>
        <button data-period="all">全部</button>
      </div>
      <div class="toolbar-right">
        <div class="segmented" id="scopes">
          <button data-scope="all" class="active">全部</button>
          <button data-scope="proxy">仅代理</button>
          <button data-scope="direct">仅直连</button>
        </div>
        <a id="exportLink" class="export" href="/api/export.csv?period=today&group=site&scope=all">导出 CSV</a>
      </div>
    </section>

    <section class="metrics" aria-label="流量总览">
      <article><span>总流量</span><strong id="total">—</strong><small id="knownRate">等待采样</small></article>
      <article><span>下载</span><strong id="download">—</strong><small>接收的数据</small></article>
      <article><span>上传</span><strong id="upload">—</strong><small>发出的数据</small></article>
      <article><span>当前连接</span><strong id="connections">—</strong><small id="lastUpdate">尚未采样</small></article>
    </section>

    <section class="panel">
      <div class="panel-head">
        <div>
          <p class="eyebrow">TOP 流量去向</p>
          <h2 id="groupTitle">按站点汇总</h2>
        </div>
        <div class="segmented groups" id="groups">
          <button data-group="site" class="active">站点</button>
          <button data-group="destination">完整域名</button>
          <button data-group="process">应用</button>
          <button data-group="rule">规则</button>
          <button data-group="outbound">出口</button>
          <button data-group="chain">出口链</button>
        </div>
      </div>
      <div class="table-head"><span>去向</span><span>下载 / 上传</span><span>合计</span></div>
      <div id="rows" class="rows"><div class="empty">正在读取数据…</div></div>
      <p class="note">“未识别”表示连接在两次采样之间已经关闭；这部分仍计入“全部”总量，但因出口也无法判定，不纳入“仅代理/仅直连”筛选。</p>
    </section>
  </main>
  <script src="/app.js" defer></script>
</body>
</html>
