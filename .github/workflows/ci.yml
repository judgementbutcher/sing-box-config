name: CI

on:
  push:
  pull_request:

jobs:
  unit:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -r requirements.lock
      - run: python scripts/quality/check_public_repo.py
      - run: python -m pytest
      - run: python -m py_compile singbox_config/builder.py singbox_config/generator.py singbox_config/traffic_monitor.py scripts/config/generate_config.py scripts/serve/serve_config.py scripts/monitor/traffic_monitor.py scripts/quality/check_public_repo.py
